<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Connect</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #fdf2f8; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    .mood-btn { font-size: 2rem; border: none; background: none; cursor: pointer; margin: 10px; transition: 0.2s; }
    .mood-btn:hover { transform: scale(1.3); }
    select { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mood Connect ✨</h1>
    <select id="userName">
      <option>Aditi</option>
      <option>Abhi</option>
    </select>
    <div>
      <button class="mood-btn" onclick="save('😊')">😊</button>
      <button class="mood-btn" onclick="save('😭')">😭</button>
      <button class="mood-btn" onclick="save('😐')">😐</button>
      <button class="mood-btn" onclick="save('❤️')">❤️</button>
    </div>
  </div>

  <script>
    function save(mood) {
      const name = document.getElementById('userName').value;
      // This is the bridge to your Google Sheet
      fetch('https://api.sheety.co/983d081ba07c085e25a01c9c23bb86a8/aditixabhi/sheet1', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          "sheet1": { 
            "Timestamp": new Date().toLocaleString(), 
            "Name": name, 
            "Mood": mood 
          }
        })
      })
      .then(response => response.json())
      .then(json => alert("Saved for " + name + "!"))
      .catch(err => alert("Error: Make sure POST is enabled in Sheety."));
    }
  </script>
</body>
</html>
